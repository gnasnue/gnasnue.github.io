<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --text: #1a1a18;
    --muted: #8a8880;
    --border: #e2e0d8;
    --accent: #c4382a;
    --card-bg: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 0 1.5rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .site-title span {
    color: var(--accent);
  }

  .site-desc {
    margin-top: 0.4rem;
    font-size: 0.875rem;
    color: var(--muted);
    font-weight: 300;
  }

  main {
    padding: 3rem 0 5rem;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .posts {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .post-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 1rem;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: opacity 0.15s;
  }

  .post-item:first-child {
    border-top: 1px solid var(--border);
  }

  .post-item:hover { opacity: 0.6; }

  .post-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    line-height: 1.4;
    color: var(--text);
  }

  .post-memo {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-weight: 300;
    line-height: 1.5;
  }

  .post-date {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 300;
  }

  .arrow {
    display: inline-block;
    font-size: 0.8rem;
    color: var(--accent);
    margin-left: 0.3rem;
    transition: transform 0.15s;
  }

  .post-item:hover .arrow { transform: translateX(3px); }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 0;
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 300;
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1 class="site-title"><span>404</span> Found</h1>
    <p class="site-desc">Hello World</p>
  </div>
</header>

<main>
  <div class="container">
    <p class="section-label">Recently found</p>
    <div class="posts">

      <a class="post-item" href="#" target="_blank" rel="noopener">
        <div>
          <div class="post-title">Visa Cli <span class="arrow">→</span></div>
          <div class="post-memo">https://visacli.sh/</div>
        </div>
        <div class="post-date">2026.03</div>
      </a>

      <a class="post-item" href="#" target="_blank" rel="noopener">
        <div>
          <div class="post-title">Neuro Business <span class="arrow">→</span></div>
          <div class="post-memo">https://pubmed.ncbi.nlm.nih.gov/38676308/</div>
        </div>
        <div class="post-date">2026.03</div>
      </a>

      <a class="post-item" href="#" target="_blank" rel="noopener">
        <div>
          <div class="post-title">Github <span class="arrow">→</span></div>
          <div class="post-memo">어려워요</div>
        </div>
        <div class="post-date">2026.03</div>
      </a>

    </div>
  </div>
</main>

<footer>
  <div class="container">
    404 Found
  </div>
</footer>

</body>
</html>
